<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背经每日打卡</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .card {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .tab.active {
            background: #000;
            color: white;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #000;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        .record-list {
            margin-top: 20px;
        }
        .record-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">背经每日打卡</h1>
    
    <div class="card">
        <p>总需打卡人数：18人</p>
        <p id="checkedCount">当日已打卡：0人</p>
        <p id="uncheckedCount">当日未打卡：18人</p>
    </div>

    <div class="tabs">
        <button class="tab active" data-day="today">今天</button>
        <button class="tab" data-day="yesterday">昨天</button>
        <button class="tab" data-day="dayBefore">前天</button>
        <button class="tab" data-day="threeDaysAgo">3天前</button>
    </div>

    <div class="input-group">
        <input type="text" id="nameInput" placeholder="请输入姓名">
    </div>
    <div class="input-group">
        <input type="text" id="bookInput" placeholder="经文名称（可不填）">
    </div>
    <div class="input-group">
        <input type="text" id="chapterInput" placeholder="请输入读到章节">
    </div>

    <button id="submitBtn">今日正常打卡</button>

    <div class="record-list" id="recordList"></div>

    <script>
        // 初始化数据
        let currentDay = 'today';
        const users = Array.from({length: 18}, (_, i) => `用户${i+1}`);
        let records = JSON.parse(localStorage.getItem('bkjRecords')) || {};

        // 日期处理
        function getDateKey(dayType) {
            const now = new Date();
            switch(dayType) {
                case 'today':
                    return now.toISOString().split('T')[0];
                case 'yesterday':
                    now.setDate(now.getDate() - 1);
                    return now.toISOString().split('T')[0];
                case 'dayBefore':
                    now.setDate(now.getDate() - 2);
                    return now.toISOString().split('T')[0];
                case 'threeDaysAgo':
                    now.setDate(now.getDate() - 3);
                    return now.toISOString().split('T')[0];
            }
        }

        // 更新统计
        function updateStats() {
            const todayKey = getDateKey('today');
            const todayRecords = records[todayKey] || [];
            document.getElementById('checkedCount').textContent = `当日已打卡：${todayRecords.length}人`;
            document.getElementById('uncheckedCount').textContent = `当日未打卡：${18 - todayRecords.length}人`;
        }

        // 渲染记录
        function renderRecords() {
            const key = getDateKey(currentDay);
            const dayRecords = records[key] || [];
            const list = document.getElementById('recordList');
            list.innerHTML = '';
            
            if (dayRecords.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #666;">暂无打卡记录</p>';
                return;
            }

            dayRecords.forEach(record => {
                const item = document.createElement('div');
                item.className = 'record-item';
                item.innerHTML = `
                    <p><strong>${record.name}</strong></p>
                    <p>经文：${record.book || '无'}</p>
                    <p>章节：${record.chapter}</p>
                `;
                list.appendChild(item);
            });
        }

        // 切换日期标签
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentDay = tab.dataset.day;
                renderRecords();
            });
        });

        // 提交打卡
        document.getElementById('submitBtn').addEventListener('click', () => {
            const name = document.getElementById('nameInput').value.trim();
            const book = document.getElementById('bookInput').value.trim();
            const chapter = document.getElementById('chapterInput').value.trim();

            if (!name || !chapter) {
                alert('请填写姓名和章节！');
                return;
            }

            const todayKey = getDateKey('today');
            if (!records[todayKey]) records[todayKey] = [];

            // 检查是否已打卡
            const alreadyChecked = records[todayKey].some(r => r.name === name);
            if (alreadyChecked) {
                alert('今天已经打卡过啦！');
                return;
            }

            records[todayKey].push({ name, book, chapter, time: new Date().toLocaleString() });
            localStorage.setItem('bkjRecords', JSON.stringify(records));

            // 清空输入框
            document.getElementById('nameInput').value = '';
            document.getElementById('bookInput').value = '';
            document.getElementById('chapterInput').value = '';

            updateStats();
            renderRecords();
            alert('打卡成功！');
        });

        // 初始化
        updateStats();
        renderRecords();
    </script>
</body>
</html>
